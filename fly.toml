# Fly.io config for the Vyastrovidi engine
# Free-tier friendly: small VM, suspend-on-idle (wakes fast on request).

app = "vyastrovidi-engine"
primary_region = "sin"   # Singapore — close to India

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"   # suspend when idle (fast resume on request)
  auto_start_machines = true       # wake on incoming request
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
